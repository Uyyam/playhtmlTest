      <script type="module">
      import { playhtml } from "https://unpkg.com/playhtml@latest";
      
    const musicPlayer = document.getElementById("music-player");
    musicPlayer.defaultData = {
  startedAt: Date.now() - musicPlayer.currentTime * 1000,
};

const DRIFT_THRESHOLD = 0.25; // seconds

musicPlayer.updateElement = ({ element, data }) => {
  element.muted = true;
  element.volume = 0.1;

  // Guard 1: data not ready / malformed
  if (!data || typeof data.startedAt !== "number" || !isFinite(data.startedAt)) {
    return;
  }

  const expected = (Date.now() - data.startedAt) / 1000;

  // Guard 2: expected must be finite and non-negative
  if (!isFinite(expected) || expected < 0) {
    return;
  }

  // Guard 3: element must have metadata loaded before we can seek
  if (element.readyState < 1 /* HAVE_METADATA */) {
    element.addEventListener(
      "loadedmetadata",
      () => {
        if (isFinite(expected)) element.currentTime = expected;
      },
      { once: true }
    );
    return;
  }

  const drift = Math.abs(element.currentTime - expected);
  if (drift > DRIFT_THRESHOLD) {
    element.currentTime = expected;
  }

  if (element.paused) {
    element.play().catch(() => {});
  }
};

musicPlayer.onMount = ({ setData, requestUpdate }) => {
  const resync = setInterval(() => {
    requestUpdate();
  }, 5000);

  return () => clearInterval(resync);
};

    

      playhtml.init({
