      <script type="module">
      import { playhtml } from "https://unpkg.com/playhtml@latest";
      
    const musicPlayer = document.getElementById("music-player");
// Store a reference point instead of raw currentTime:
// startedAt = epoch ms when playback would have been at t=0
musicPlayer.defaultData = {
  startedAt: Date.now() - musicPlayer.currentTime * 1000,
};

const DRIFT_THRESHOLD = 0.25; // seconds, only correct if off by more than this

musicPlayer.updateElement = ({ element, data }) => {
  element.volume = 0.2;

  const expected = (Date.now() - data.startedAt) / 1000;
  const drift = Math.abs(element.currentTime - expected);

  if (drift > DRIFT_THRESHOLD) {
    element.currentTime = expected;
  }

  if (element.paused) {
    element.play().catch(() => {});
  }
};

musicPlayer.onMount = ({ setData, requestUpdate }) => {
  // Only set the reference once — don't keep resetting it every second.
  // If you want periodic re-sync in case of clock skew, do it rarely
  // and only correct big drift (handled above), e.g. every 10-15s:
  const resync = setInterval(() => {
    requestUpdate(); // just re-runs updateElement with existing data, checks drift
  }, 5000);

  return () => clearInterval(resync);
};

playhtml.init({ developmentMode: true });
window.playhtml = playhtml;
        
const captures = {};

function createUser(id){
  const el = document.createElement("div");
  el.setAttribute("can-mirror", "")
el.id = id;
//
document.getElementById('sketch-holder').appendChild(el);
new p5((p) => newCapture(p, id));
playhtml.setupPlayElement(el, { ignoreIfAlreadySetup: true });
}

function newCapture(p , id) {
  p.setup = function () {
  let canvas = p.createCanvas(100, 200);
const capture = p.createCapture(p.VIDEO, { flipped: true });

    captures[id] = capture; // store it, keyed by user id
  
  // Move the canvas so it’s inside our <div id="sketch-holder">.

    capture.parent(document.getElementById(id));
          canvas.parent('sketch-holder');
          canvas.hide();
  };
}

    

      playhtml.init({
        developmentMode: true
      });

      // Make playhtml available globally for script.js
      window.playhtml = playhtml;
      
playhtml.ready.then(() => {
            playhtml.presence
              .getPresences()
              .entries()
              .forEach(([id, p]) => {
            playhtml.presence.getPresences().entries().forEach(([id, p]) =>{
            createUser(id);
            });
            
             console.log(playhtml.presence.getMyIdentity().publicKey);
            console.log(playhtml.presence.getPresences());
          })
          document.addEventListener('mousemove', (event) => {
  // Use clientX and clientY for viewport coordinates
  document.getElementById(playhtml.presence.getMyIdentity().publicKey).style.left = `${event.clientX}px`;
  document.getElementById(playhtml.presence.getMyIdentity().publicKey).style.top = `${event.clientY}px`;


});

        });
