  <body>
      <div id="sketch-holder">
             <script src="sketch.js"></script>
      <!-- Our sketch will go here! -->
    </div>

    <audio autoplay muted loop id="music-player" can-play>
  <source src="MAMA.mp3" type="audio/mp3">
</audio>



  </body>
      <script type="module">
      import { playhtml } from "https://unpkg.com/playhtml@latest";
      
    const musicPlayer = document.getElementById("music-player");
    musicPlayer.onMount = ({ getData, requestUpdate }) => {
      musicPlayer.defaultData = { time: musicPlayer.currentTime };
      //set time to position of audo element to data
        playhtml.ready.then(() => {
        if (cancelled) return;
        // Safe to read presence, page data, or fully-hydrated shared state here
      setData((data) => { data.time = musicPlayer.currentTime; });
      });


      musicPlayer.addEventListener('mousemove', setData((data) => { data.time = musicPlayer.currentTime; }));
      

      musicPlayer.updateElement = ({ element, data }) => {
        element.currentTime = data.time;
        console.log(element.currentTime)
      };
    }
      // Initialize with cursor tracking
      playhtml.init({
        cursors: {
          enabled: true,
          room: "page"
        },
        developmentMode: true
      });

      // Make playhtml available globally for script.js
      window.playhtml = playhtml;


    </script>
    <!-- The website JavaScript file -->
    <script src="script.js" defer></script>

</html>
